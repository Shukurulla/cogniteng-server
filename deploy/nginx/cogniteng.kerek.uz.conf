# /etc/nginx/sites-available/cogniteng.kerek.uz
#
# API-only reverse proxy → Express on 127.0.0.1:5050
#
# Step 1: Copy this file to /etc/nginx/sites-available/cogniteng.kerek.uz
# Step 2: ln -s /etc/nginx/sites-available/cogniteng.kerek.uz /etc/nginx/sites-enabled/
# Step 3: nginx -t && systemctl reload nginx
# Step 4: certbot --nginx -d cogniteng.kerek.uz   # automatically injects the SSL block

server {
    listen 80;
    listen [::]:80;
    server_name cogniteng.kerek.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10M;

    # Everything proxies to the backend. Express handles /api/* routes;
    # any other path returns the express notFound handler.
    location / {
        proxy_pass         http://127.0.0.1:5050;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
